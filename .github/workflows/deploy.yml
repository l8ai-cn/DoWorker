# Deploy Do Worker server-side stack on every push to main.
# Images publish to Docker Hub as l8ai/doworker-*.

name: Deploy

on:
  push:
    branches: [main]

env:
  DOCKERHUB_REGISTRY: docker.io
  HUB_IMAGE_PREFIX: l8ai/doworker

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      web-admin: ${{ steps.filter.outputs.web-admin }}
      relay: ${{ steps.filter.outputs.relay }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'proto/**'
              - 'agentfile/**'
              - 'go.mod'
              - 'go.sum'
            web:
              - 'clients/web/**'
              - 'clients/core/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            web-admin:
              - 'clients/web-admin/**'
              - 'packages/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
            relay:
              - 'relay/**'
              - 'go.mod'
              - 'go.sum'
            migrations:
              - 'backend/migrations/**'

  version:
    name: Compute Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      minor: ${{ steps.compute.outputs.minor }}
    steps:
      - uses: actions/checkout@v6
      - id: compute
        run: |
          set -euo pipefail
          echo "version=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "minor=latest" >> "$GITHUB_OUTPUT"

  build-images:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            file: backend/Dockerfile
          - service: runner
            file: runner/Dockerfile
          - service: relay
            file: relay/Dockerfile
          - service: web
            file: clients/web/Dockerfile
          - service: web-admin
            file: clients/web-admin/Dockerfile
    outputs:
      version: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Free disk
        if: matrix.service == 'web' || matrix.service == 'web-admin'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          tags: |
            ${{ env.HUB_IMAGE_PREFIX }}-${{ matrix.service }}:${{ needs.version.outputs.version }}
            ${{ env.HUB_IMAGE_PREFIX }}-${{ matrix.service }}:${{ needs.version.outputs.minor }}
          cache-from: type=gha,scope=deploy-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=deploy-${{ matrix.service }}

  deploy-uswest:
    name: Deploy US West
    needs: [changes, build-images]
    if: always() && needs.build-images.result == 'success' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.web-admin == 'true')
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-us-west-001 "set -euo pipefail
            for svc in backend web web-admin relay; do
              docker pull l8ai/doworker-\$svc:${VERSION}
            done
            cd /opt/agentsmesh && git pull --rebase --autostash origin main
            ./deploy.sh uswest-prod --version ${VERSION}"

  deploy-uswest-relay-01:
    name: Deploy US West Relay 01
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.relay == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-us-west-relay-001 "set -euo pipefail
            docker pull l8ai/doworker-relay:${VERSION}
            cd /opt/agentsmesh/relay && ./deploy.sh uswest-relay-01 --pull"

  deploy-uswest-relay-beijing-02:
    name: Deploy US West Relay Beijing 02
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.relay == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-agentsmesh-us-relay-beijing-002 "set -euo pipefail
            docker pull l8ai/doworker-relay:${VERSION}
            cd /opt/agentsmesh/relay && ./deploy.sh uswest-relay-beijing-02 --pull"

  migrate-uswest:
    name: Migrate US West
    needs: [changes, deploy-uswest]
    if: always() && needs.changes.outputs.migrations == 'true' && needs.deploy-uswest.result == 'success'
    runs-on: [self-hosted, deploy]
    steps:
      - name: Pre-flight check
        run: ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./migrate.sh uswest-prod --check"
      - name: Apply migrations
        run: ssh aliyun-us-west-001 "cd /opt/agentsmesh && ./migrate.sh uswest-prod --direction up"

  deploy-cn:
    name: Deploy CN
    needs: [changes, build-images]
    if: always() && needs.build-images.result == 'success' && (needs.changes.outputs.backend == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.web-admin == 'true')
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-s001 "set -euo pipefail
            for svc in backend web web-admin relay; do
              docker pull l8ai/doworker-\$svc:${VERSION}
            done
            cd /opt/agentsmesh && git pull --rebase --autostash origin main
            ./deploy.sh cn-prod --version ${VERSION}"

  deploy-cn-relay-01:
    name: Deploy CN Relay 01
    needs: [changes, build-images]
    if: always() && needs.changes.outputs.relay == 'true' && needs.build-images.result != 'failure'
    runs-on: [self-hosted, deploy]
    steps:
      - run: |
          VERSION="${{ needs.build-images.outputs.version }}"
          ssh aliyun-cn-relay-01 "set -euo pipefail
            docker pull l8ai/doworker-relay:${VERSION}
            cd /opt/agentsmesh/relay && ./deploy.sh cn-relay-01 --pull"

  migrate-cn:
    name: Migrate CN
    needs: [changes, deploy-cn]
    if: always() && needs.changes.outputs.migrations == 'true' && needs.deploy-cn.result == 'success'
    runs-on: [self-hosted, deploy]
    steps:
      - name: Pre-flight check
        run: ssh aliyun-s001 "cd /opt/agentsmesh && ./migrate.sh cn-prod --check"
      - name: Apply migrations
        run: ssh aliyun-s001 "cd /opt/agentsmesh && ./migrate.sh cn-prod --direction up"
