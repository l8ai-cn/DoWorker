# Deploy Do Worker to the single shared test environment on every push to main.
# The environment is cluster-oilan, reached through DoOps target gw-oilan-node.

name: Deploy test environment

on:
  push:
    branches: [main]
    paths:
      - 'deploy/kubernetes/cluster-oilan/**'
      - '!deploy/kubernetes/cluster-oilan/**/*_test.sh'
      - '!deploy/kubernetes/cluster-oilan/**/*_test.mjs'
      - '!deploy/kubernetes/cluster-oilan/**/*.md'

permissions:
  actions: read
  checks: read
  contents: read

concurrency:
  group: deploy-test-environment
  cancel-in-progress: false

env:
  DOOPS_TARGET: gw-oilan-node

jobs:
  deploy-test:
    name: Deploy test environment
    runs-on: [self-hosted, deploy]
    env:
      DOOPS_SESSION: deploy-test-${{ github.run_id }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Wait for release checks
        run: |
          source deploy/kubernetes/cluster-oilan/release_ci_gate.sh
          release_wait_for_ci_success "${GITHUB_SHA}"
      - name: Reconcile test environment
        run: bash deploy/kubernetes/cluster-oilan/deploy.sh
