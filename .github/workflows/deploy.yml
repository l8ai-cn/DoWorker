# Deploy Do Worker to the single shared test environment on every push to main.
# The environment is cluster-oilan, reached through DoOps target gw-oilan-node.

name: Deploy test environment

on:
  push:
    branches: [main]

env:
  DOOPS_TARGET: gw-oilan-node

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v7
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            deploy:
              - 'backend/**'
              - 'marketplace/**'
              - 'relay/**'
              - 'clients/web/**'
              - 'clients/web-admin/**'
              - 'clients/marketplace-web/**'
              - 'clients/mobile-lovable/**'
              - 'clients/core/**'
              - 'packages/**'
              - 'docker/agent-runtime/**'
              - 'deploy/kubernetes/cluster-oilan/**'
              - '.github/workflows/deploy.yml'
  deploy-test:
    name: Deploy test environment
    needs: changes
    if: needs.changes.outputs.deploy == 'true'
    runs-on: [self-hosted, deploy]
    env:
      DOOPS_SESSION: deploy-test-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v7
      - name: Publish platform images
        run: bash deploy/kubernetes/cluster-oilan/push-images.sh platform
      - name: Reconcile test environment
        run: bash deploy/kubernetes/cluster-oilan/deploy.sh
