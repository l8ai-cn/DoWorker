name: CI

# Unified PR/main gate — Go / Cargo / pnpm / e2e. No Bazel.

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.25"
  NODE_VERSION: "20"
  PNPM_VERSION: "9"
  GOLANGCI_LINT_VERSION: "v2.11.4"

jobs:
  smoke:
    name: Smoke (contracts)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Identifier contract lint
        run: bash tools/identifier-lint/lint.sh
      - name: Dev runner contract
        run: bash deploy/dev/runner_runtime_contract_test.sh
      - name: Agent-runtime contract
        run: bash docker/agent-runtime/contract_test.sh

  go:
    name: Go (tests)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Go protos
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          bash scripts/ensure-go-codegen.sh
      - name: Unit tests
        run: |
          go test -count=1 ./backend/... ./runner/... ./relay/... ./agentfile/... ./proto/...
      - name: Poddaemon integration
        run: |
          go test -count=1 -tags=integration ./runner/internal/poddaemon/...

  go-lint:
    name: Go Lint (${{ matrix.module }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        module: [backend, runner, relay]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Go protos
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          bash scripts/ensure-go-codegen.sh
      - uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.module }}
          args: --timeout=10m

  go-windows:
    name: Runner Tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 25
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: arduino/setup-protoc@v3
        with:
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Go protos
        shell: bash
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          bash scripts/ensure-go-codegen.sh
      - name: Runner unit tests
        shell: bash
        run: |
          for i in 1 2 3; do
            go test -count=1 ./runner/... && exit 0
            echo "attempt $i failed; retrying..."
            sleep 2
          done
          exit 1

  release-smoke:
    name: Release Smoke (cross-build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Generate Go protos
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          bash scripts/ensure-go-codegen.sh
      - name: Build release archives
        env:
          VERSION: "0.0.0-rc.smoke"
        run: bash scripts/build-runner-release.sh
      - name: Verify archives
        run: |
          set -euo pipefail
          cd dist/runner-release
          expected=(
            do-worker-runner_linux_amd64.tar.gz
            do-worker-runner_linux_arm64.tar.gz
            do-worker-runner_darwin_amd64.tar.gz
            do-worker-runner_darwin_arm64.tar.gz
            do-worker-runner_windows_amd64.zip
            do-worker-runner_windows_arm64.zip
            checksums.txt
          )
          for f in "${expected[@]}"; do
            [[ -f "$f" ]] || { echo "::error::Missing $f"; exit 1; }
            size=$(stat -c%s "$f")
            [[ "$size" -ge 100 ]] || { echo "::error::Too small $f ($size)"; exit 1; }
            echo "✓ $f ($size bytes)"
          done
          cat checksums.txt

  rust:
    name: Rust Core (clients/core)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/core
      - name: cargo test --workspace
        working-directory: clients/core
        run: cargo test --workspace --exclude do_worker_wasm

  web:
    name: Web (lint + type-check + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/core
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:wasm
      - run: pnpm run web:lint
      - run: pnpm run web:typecheck
      - run: pnpm run web:test
      - run: pnpm run web-admin:typecheck

  web-admin:
    name: Web-Admin (lint + vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run web-admin:lint
      - run: pnpm run web-admin:test

  docker-verify:
    name: Docker Image Build (${{ matrix.service }})
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: smoke
    if: github.event_name == 'pull_request'
    strategy:
      fail-fast: false
      matrix:
        service: [backend, runner, relay, web, web-admin]
    steps:
      - uses: actions/checkout@v6
      - name: Free disk
        if: matrix.service == 'web' || matrix.service == 'web-admin'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.service == 'backend' && 'backend/Dockerfile' || matrix.service == 'runner' && 'runner/Dockerfile' || matrix.service == 'relay' && 'relay/Dockerfile' || matrix.service == 'web' && 'clients/web/Dockerfile' || 'clients/web-admin/Dockerfile' }}
          push: false
          tags: agentsmesh/${{ matrix.service }}:ci
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  web-e2e:
    name: E2E (Web — Playwright shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ${{ vars.WEB_E2E_RUNNER == 'self-hosted' && fromJSON('["self-hosted", "web-e2e"]') || 'ubuntu-latest' }}
    timeout-minutes: 75
    needs: smoke
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      AGENTSMESH_WORKTREE_NAME: head-shard${{ matrix.shard }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: clients/core
      - name: Free disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - name: Install wasm-pack + air
        run: |
          curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
          go install github.com/air-verse/air@v1.61.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: pnpm install --frozen-lockfile
      - name: Cleanup previous dev-stack residue
        run: |
          PROJECT="agentsmesh-${AGENTSMESH_WORKTREE_NAME}"
          docker container ls -a --filter "label=com.docker.compose.project=${PROJECT}" -q \
            | xargs -r docker rm -f
          docker volume ls -q --filter "label=com.docker.compose.project=${PROJECT}" \
            | xargs -r docker volume rm -f
          (cd deploy/dev && ./dev.sh --clean) || true
      - name: Bring up dev backend stack
        env:
          DEV_SKIP_DOAGENT: "1"
          DEV_E2E_RUNNERS_ONLY: "1"
        run: |
          ./deploy/dev/dev.sh --backend-only
          sleep 10
      - name: Resolve worktree-allocated ports
        id: ports
        run: |
          source deploy/dev/.env
          echo "HTTP_PORT=$HTTP_PORT" >> $GITHUB_OUTPUT
          echo "WEB_PORT=$WEB_PORT" >> $GITHUB_OUTPUT
          echo "POSTGRES_PORT=$POSTGRES_PORT" >> $GITHUB_OUTPUT
          echo "COMPOSE_PROJECT_NAME=$COMPOSE_PROJECT_NAME" >> $GITHUB_OUTPUT
          echo "BACKEND_HTTP_PORT=$BACKEND_HTTP_PORT" >> $GITHUB_OUTPUT
      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -sf "http://localhost:${{ steps.ports.outputs.HTTP_PORT }}/health" > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 3
          done
          echo "backend never reported healthy"; exit 1
      - name: Wait for e2e-echo runners online
        run: |
          source deploy/dev/.env
          for i in {1..60}; do
            online=$(docker exec "${COMPOSE_PROJECT_NAME}-postgres-1" \
              psql -U agentsmesh -d agentsmesh -Atc \
              "SELECT count(*) FROM runners
               WHERE node_id IN ('dev-runner','dev-runner-2')
                 AND status='online'
                 AND last_heartbeat > now()-interval '60 seconds'" 2>/dev/null || echo 0)
            if [[ "${online}" -ge 1 ]]; then
              echo "e2e-echo runner(s) online: ${online}"; exit 0
            fi
            sleep 3
          done
          echo "no e2e-echo runner online after wait"
          docker compose -f deploy/dev/docker-compose.yml \
            -f deploy/dev/docker-compose.runners.yml \
            --project-name "${COMPOSE_PROJECT_NAME}" \
            logs --tail=80 runner-e2e-echo runner-e2e-echo-2 || true
          exit 1
      - name: Install Playwright chromium
        run: pnpm exec playwright install chromium-headless-shell
      - name: Start Web dev-server (background)
        env:
          PORT: ${{ steps.ports.outputs.WEB_PORT }}
          API_PROXY_TARGET: http://localhost:${{ steps.ports.outputs.BACKEND_HTTP_PORT }}
          NEXT_PUBLIC_E2E: "true"
        run: |
          pnpm run build:wasm
          nohup bash -c "cd clients/web && PORT=${PORT} API_PROXY_TARGET=${API_PROXY_TARGET} NEXT_PUBLIC_E2E=true \
            node ../../node_modules/next/dist/bin/next dev --turbopack --port ${PORT}" \
            > /tmp/web-dev.log 2>&1 &
          disown
          for i in {1..600}; do
            if curl -sf "http://localhost:${{ steps.ports.outputs.WEB_PORT }}" -o /dev/null; then
              echo "web dev ready"; exit 0
            fi
            sleep 3
          done
          echo "web dev never came up"; cat /tmp/web-dev.log; exit 1
      - name: Run Web Playwright e2e
        env:
          HTTP_PORT: ${{ steps.ports.outputs.HTTP_PORT }}
          WEB_PORT: ${{ steps.ports.outputs.WEB_PORT }}
          POSTGRES_PORT: ${{ steps.ports.outputs.POSTGRES_PORT }}
          COMPOSE_PROJECT_NAME: ${{ steps.ports.outputs.COMPOSE_PROJECT_NAME }}
          CI: "true"
        run: |
          pnpm exec playwright test \
            --config clients/web/e2e-playwright/playwright.config.ts \
            --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - name: Upload Web e2e artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: web-e2e-artifacts-shard-${{ matrix.shard }}
          path: |
            /tmp/web-dev.log
            test-results/
            clients/web/e2e-playwright/playwright-report/
          if-no-files-found: ignore
          retention-days: 7
      - name: Dump backend logs on failure
        if: failure()
        working-directory: deploy/dev
        run: |
          source .env
          docker compose logs --tail=200 || true
          docker compose -f docker-compose.yml -f docker-compose.runners.yml \
            logs --tail=200 runner-e2e-echo runner-e2e-echo-2 || true

  hive-e2e:
    name: E2E (Hive — compat API + browser)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install air
        run: |
          go install github.com/air-verse/air@v1.61.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - run: |
          pnpm install --frozen-lockfile
          pnpm exec playwright install chromium-headless-shell
      - name: Bring up dev backend stack
        env:
          DEV_SKIP_DOAGENT: "1"
        run: |
          ./deploy/dev/dev.sh --backend-only
          sleep 15
      - name: Resolve ports
        id: ports
        run: |
          source deploy/dev/.env
          echo "BACKEND_HTTP_PORT=$BACKEND_HTTP_PORT" >> $GITHUB_OUTPUT
      - name: Run hive smoke
        env:
          HIVE_API_URL: http://localhost:${{ steps.ports.outputs.BACKEND_HTTP_PORT }}
        run: bash deploy/dev/hive_smoke.sh
      - name: Dump logs on failure
        if: failure()
        working-directory: deploy/dev
        run: |
          docker compose logs --tail=300 runner-e2e-echo || true
          tail -n 300 runtime/backend/backend.log || true

  mcp-e2e:
    name: E2E (MCP — agent protocol)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: smoke
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install air
        run: |
          go install github.com/air-verse/air@v1.61.7
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Bring up dev backend stack
        env:
          DEV_SKIP_DOAGENT: "1"
        run: |
          ./deploy/dev/dev.sh --backend-only
          sleep 20
      - name: Resolve ports
        id: ports
        run: |
          source deploy/dev/.env
          echo "HTTP_PORT=$HTTP_PORT" >> $GITHUB_OUTPUT
          echo "BACKEND_HTTP_PORT=$BACKEND_HTTP_PORT" >> $GITHUB_OUTPUT
          echo "POSTGRES_PORT=$POSTGRES_PORT" >> $GITHUB_OUTPUT
          echo "RUNNER_MCP_PORT=$RUNNER_MCP_PORT" >> $GITHUB_OUTPUT
          echo "RUNNER_2_MCP_PORT=$RUNNER_2_MCP_PORT" >> $GITHUB_OUTPUT
      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -sf "http://localhost:${{ steps.ports.outputs.HTTP_PORT }}/health" > /dev/null; then
              echo "backend ready"; exit 0
            fi
            sleep 3
          done
          echo "backend never reported healthy"; exit 1
      - name: Run MCP E2E suites
        env:
          MCP_PORT: ${{ steps.ports.outputs.RUNNER_MCP_PORT }}
          RUNNER_2_MCP_PORT: ${{ steps.ports.outputs.RUNNER_2_MCP_PORT }}
          BACKEND_HTTP_PORT: ${{ steps.ports.outputs.BACKEND_HTTP_PORT }}
          POSTGRES_PORT: ${{ steps.ports.outputs.POSTGRES_PORT }}
          POSTGRES_USER: agentsmesh
          POSTGRES_PASSWORD: agentsmesh_dev
          POSTGRES_DB: agentsmesh
        run: go test -count=1 ./tests/mcp-e2e/suites/... -timeout 25m
      - name: Dump logs on failure
        if: failure()
        working-directory: deploy/dev
        run: |
          docker compose logs --tail=300 backend || true
          docker compose logs --tail=300 runner || true
          tail -n 300 runtime/runner/runner.log || true
          tail -n 300 runtime/backend/backend.log || true
      - name: Upload MCP e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-e2e-logs
          path: |
            deploy/dev/runtime/runner/runner.log
            deploy/dev/runtime/backend/backend.log
            deploy/dev/runtime/relay/relay.log
          if-no-files-found: ignore
          retention-days: 7
