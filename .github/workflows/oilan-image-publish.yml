name: Oilan Image Publish

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

env:
  REGISTRY: docker.io
  IMAGE_PREFIX: docker.io/l8ai/doworker-oilan

jobs:
  verify-source:
    name: Verify release source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require main with successful CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "${GITHUB_REF}" = "refs/heads/main"
          test "$(git rev-parse HEAD)" = "${GITHUB_SHA}"
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${GITHUB_SHA}&event=push&per_page=100" \
            | jq -e 'any(.workflow_runs[]; .name == "CI" and .conclusion == "success")'

  publish:
    name: Publish ${{ matrix.service }}
    needs: verify-source
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            file: backend/Dockerfile
          - service: marketplace
            file: marketplace/Dockerfile
          - service: marketplace-web
            file: clients/marketplace-web/Dockerfile
          - service: relay
            file: relay/Dockerfile
          - service: web
            file: clients/web/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - name: Free disk
        if: matrix.service == 'marketplace-web' || matrix.service == 'web'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.file }}
          platforms: linux/amd64
          provenance: false
          push: true
          tags: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:sha-${{ github.sha }}
          labels: org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=oilan-${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=oilan-${{ matrix.service }}
      - name: Resolve staging platform digest
        id: digest
        env:
          IMAGE: ${{ env.IMAGE_PREFIX }}-${{ matrix.service }}:sha-${{ github.sha }}
        run: |
          set -euo pipefail
          manifest="$(docker buildx imagetools inspect "$IMAGE" --format '{{json .Manifest}}')"
          digest="$(
            jq -er '
              if has("manifests") then
                [.manifests[]
                  | select(.platform.os == "linux" and .platform.architecture == "amd64")
                ][0].digest
              else
                .digest
              end
            ' <<<"$manifest"
          )"
          test "${digest#sha256:}" != "$digest"
          mkdir -p digests
          printf '%s\n' "$digest" > "digests/${{ matrix.service }}.txt"
      - uses: actions/upload-artifact@v6
        with:
          name: oilan-digest-${{ matrix.service }}
          path: digests/${{ matrix.service }}.txt
          retention-days: 7

  manifest:
    name: Assemble staging manifest
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: oilan-digest-*
          path: digests
          merge-multiple: true
      - name: Write promotion manifest
        env:
          SOURCE_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail
          entries="$(mktemp)"
          for service in backend marketplace marketplace-web relay web; do
            digest="$(cat "digests/${service}.txt")"
            jq -nc \
              --arg service "${service}" \
              --arg source "${IMAGE_PREFIX}-${service}:sha-${SOURCE_COMMIT}" \
              --arg digest "${digest}" \
              '{key: $service, value: {source: $source, digest: $digest}}' \
              >> "${entries}"
          done
          jq -s \
            --arg commit "${SOURCE_COMMIT}" \
            '{
              schema_version: 1,
              source_commit: $commit,
              platform: "linux/amd64",
              images: (from_entries)
            }' "${entries}" > oilan-staging-release.json
          jq -e '
            .source_commit | test("^[a-f0-9]{40}$")
          ' oilan-staging-release.json >/dev/null
      - uses: actions/upload-artifact@v6
        with:
          name: oilan-staging-release
          path: oilan-staging-release.json
          retention-days: 7
