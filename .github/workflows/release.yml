# Tag a versioned release: build runner CLI archives, create a GitHub
# Release, and attach everything as Release assets.
#
# Triggered ONLY on `vX.Y.Z` tags. Server-side OCI image build +
# deploy + migrate live in `.github/workflows/deploy.yml` and run on
# main pushes.

name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  version:
    name: Compute Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      minor: ${{ steps.compute.outputs.minor }}
    steps:
      - uses: actions/checkout@v7
      - id: compute
        run: |
          set -euo pipefail
          full="${GITHUB_REF#refs/tags/v}"
          minor="${full%.*}"
          echo "version=${full}" >> "$GITHUB_OUTPUT"
          echo "minor=${minor}" >> "$GITHUB_OUTPUT"

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [version]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true
      - name: Install codegen tools
        run: |
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          bash scripts/ci-install-codegen-tools.sh
      - name: Generate Go protos + amesh
        run: bash scripts/ensure-go-codegen.sh

      - name: Build release assets
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: bash scripts/build-runner-release.sh

      - name: Install rcodesign
        run: |
          RCODESIGN_VERSION="0.29.0"
          cd /tmp
          curl -fsSL "https://github.com/indygreg/apple-platform-rs/releases/download/apple-codesign/${RCODESIGN_VERSION}/apple-codesign-${RCODESIGN_VERSION}-x86_64-unknown-linux-musl.tar.gz" | tar xz
          sudo cp ./apple-codesign-*/rcodesign /usr/local/bin/
          rm -rf ./apple-codesign-*

      - name: Stage + sign release artifacts
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          ENTITLEMENTS: ${{ github.workspace }}/runner/build/darwin/entitlements.plist
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          mkdir -p release-staging
          sign_script="${GITHUB_WORKSPACE}/runner/build/scripts/sign-darwin.sh"

          for arch in dist/runner-release/do-worker-runner_*.tar.gz \
                     dist/runner-release/do-worker-runner_*.zip; do
              base="$(basename "$arch")"
              new_name="${base/do-worker-runner_/do-worker-runner_${version}_}"
              dest="${GITHUB_WORKSPACE}/release-staging/${new_name}"

              if [[ "$base" == *darwin*.tar.gz ]]; then
                  tmp="$(mktemp -d)"
                  tar -xzf "$arch" -C "$tmp"
                  (cd "$tmp" && "$sign_script" do-worker-runner)
                  tar -C "$tmp" -czf "$dest" do-worker-runner README.md LICENSE
                  rm -rf "$tmp"
              else
                  cp "$arch" "$dest"
              fi
          done

          (
              cd release-staging
              sha256sum do-worker-runner_*.tar.gz do-worker-runner_*.zip > checksums.txt
          )
          ls -la release-staging/
          cat release-staging/checksums.txt

      - name: Generate changelog
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          previous_tag="$(git describe --tags --abbrev=0 "${GITHUB_REF}^" 2>/dev/null || echo "")"
          {
            echo "## Do Worker Runner v${version}"
            echo ""
            echo "Do Worker Runner is an AI Agent task executor that connects to the Do Worker server and executes AI agent tasks in isolated terminal environments."
            echo ""
            echo "### Quick Install"
            echo ""
            echo '**macOS / Linux (one-line):**'
            echo '```bash'
            echo 'curl -fsSL https://agentsmesh.ai/install.sh | sh'
            echo '```'
            echo ""
            echo '**Windows (PowerShell):**'
            echo '```powershell'
            echo 'irm https://agentsmesh.ai/install.ps1 | iex'
            echo '```'
            echo ""
            if [[ -n "$previous_tag" ]]; then
              echo "### Changes since ${previous_tag}"
              echo ""
              for prefix in "feat" "fix" "perf"; do
                title=""
                case "$prefix" in
                  feat) title="### New Features" ;;
                  fix) title="### Bug Fixes" ;;
                  perf) title="### Performance" ;;
                esac
                entries="$(git log "${previous_tag}..${GITHUB_REF}" --pretty=format:'- %s' | grep -E "^- ${prefix}(\(.+\))?!?:" || true)"
                if [[ -n "$entries" ]]; then
                  echo "$title"
                  echo ""
                  echo "$entries"
                  echo ""
                fi
              done
            fi
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF#refs/tags/v}"
          prerelease_flag=""
          if [[ "$version" == *-* ]]; then
              prerelease_flag="--prerelease"
          fi
          gh release create "${GITHUB_REF#refs/tags/}" \
              --title "Do Worker Runner v${version}" \
              --notes-file release-notes.md \
              $prerelease_flag \
              release-staging/*
