name: Runtime Images

on:
  push:
    branches: [main]
    paths:
      - 'docker/agent-runtime/**'
      - 'deploy/dev/lib/build_do_agent_binary.sh'
      - 'deploy/dev/runner-entrypoint.sh'
      - 'runner/**'
      - 'proto/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/runtime-images.yml'
  workflow_dispatch:

env:
  DOCKERHUB_REGISTRY: docker.io
  HUB_IMAGE_PREFIX: l8ai/doworker-runner

jobs:
  build:
    name: Build ${{ matrix.runtime }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        runtime: [minimax-cli, grok-build, openclaw, hermes]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Prepare runtime build context
        run: bash docker/agent-runtime/prepare_binaries.sh docker/agent-runtime/_context ${{ matrix.runtime }}
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: docker/agent-runtime/_context
          file: docker/agent-runtime/Dockerfile
          target: runtime
          build-args: AGENT_RUNTIME=${{ matrix.runtime }}
          push: true
          tags: ${{ env.HUB_IMAGE_PREFIX }}-${{ matrix.runtime }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=runtime-${{ matrix.runtime }}
          cache-to: type=gha,mode=max,scope=runtime-${{ matrix.runtime }}
      - name: Record immutable reference
        run: |
          echo '`${{ env.HUB_IMAGE_PREFIX }}-${{ matrix.runtime }}@${{ steps.build.outputs.digest }}`' >> "$GITHUB_STEP_SUMMARY"
