x-runner-build-base: &runner-build-base
  context: .
  dockerfile: ../../docker/agent-runtime/Dockerfile
  target: runtime

x-runner-build-args: &runner-build-args
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""

x-runner-env: &runner-env
  HTTP_PROXY: ""
  HTTPS_PROXY: ""
  http_proxy: ""
  https_proxy: ""
  NO_PROXY: "*"
  BACKEND_URL: http://traefik:80
  # Runners reach the host-side gRPC listener via host.lan (Docker Desktop
  # host-gateway). Avoid host.docker.internal on macOS when a fake-ip proxy
  # (Surge/Clash) rewrites it to 198.18.0.0/15 — TLS then EOFs.
  GRPC_ENDPOINT: host.lan:${BACKEND_GRPC_PORT:-10016}
  # Keep Traefik as the relay origin so /relay is stripped before the
  # host-side relay mux. Direct host.lan:<RELAY_HTTP_PORT> is often
  # unreachable from GitHub Actions docker (host-gateway:32367 refused)
  # even when gRPC on a different host port works.
  RELAY_BASE_URL: ws://traefik:80
  RUNNER_ORG_SLUG: dev-org
  MAX_CONCURRENT_PODS: "10"
  WORKSPACE: /workspace
  SSL_DIR: /app/ssl
  DEBUG: "true"
  HOME: /home/runner
  DO_WORKER_MCP_BIND: 0.0.0.0
  # Provider keys come from ai_models at session create, not runner container env.
  OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
  OTEL_SERVICE_NAME: do-worker-runner
  OTEL_TRACES_SAMPLER_ARG: "1.0"

x-runner-common: &runner-common
  platform: linux/amd64
  restart: unless-stopped
  depends_on:
    traefik:
      condition: service_started
  user: "1000:1000"
  extra_hosts:
    - "host.lan:host-gateway"
  entrypoint: ["/usr/local/bin/runner-entrypoint.sh"]

services:
  runner-e2e-echo:
    <<: *runner-common
    build: { <<: *runner-build-base, args: { <<: *runner-build-args, AGENT_RUNTIME: e2e-echo } }
    environment: { <<: *runner-env, RUNNER_NODE_ID: dev-runner, AGENT_RUNTIME: e2e-echo, DEFAULT_AGENT: e2e-echo }
    volumes:
      - ./ssl:/app/ssl:ro
      - ./runner-entrypoint.sh:/usr/local/bin/runner-entrypoint.sh:ro
      - ./runner-ssh:/run/runner-ssh-source:ro
      - runner_e2e_workspace:/workspace
      - runner_e2e_config:/home/runner/.agentsmesh
    ports:
      - "${RUNNER_MCP_PORT:-19000}:19000"

  runner-e2e-echo-2:
    <<: *runner-common
    build: { <<: *runner-build-base, args: { <<: *runner-build-args, AGENT_RUNTIME: e2e-echo } }
    environment: { <<: *runner-env, RUNNER_NODE_ID: dev-runner-2, AGENT_RUNTIME: e2e-echo, DEFAULT_AGENT: e2e-echo }
