# air hot-reload for backend (DEV_NO_BAZEL=1 / dev-lite.sh).
# Run from repo root: air -c deploy/dev/air/backend.toml

root = "."
tmp_dir = "deploy/dev/runtime/backend/air"

[build]
cmd = "bash deploy/dev/build-host-go-binary.sh ./backend/cmd/server ./deploy/dev/runtime/backend/air/main"
bin = "./deploy/dev/runtime/backend/air/main"
full_bin = "./deploy/dev/runtime/backend/air/main"
include_ext = ["go"]
exclude_dir = [
  "assets", "tmp", "vendor", "testdata", "node_modules",
  "bazel-bin", "bazel-out", "bazel-testlogs", "bazel-agentsmesh",
  "clients", "deploy", "docs", "e2e", "packages", "proto/gen/ts",
]
delay = 800
stop_delay = 500
send_interrupt = true
kill_delay = 500

[log]
time = false

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"
