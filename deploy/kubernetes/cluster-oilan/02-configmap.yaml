apiVersion: v1
kind: ConfigMap
metadata:
  name: agentcloud-config
  namespace: agentcloud
data:
  PRIMARY_DOMAIN: "dowork.l8ai.cn"
  PUBLIC_WEB_URL: "https://dowork.l8ai.cn"
  PREVIEW_PUBLIC_ORIGIN: "https://l8ai.cn"
  PREVIEW_COOKIE_MODE: "partitioned"
  MOBILE_PUBLIC_BASE_URL: "https://mobile.l8ai.cn"
  RELAY_ALLOWED_ORIGINS: "https://dowork.l8ai.cn,https://mobile.l8ai.cn"
  USE_HTTPS: "true"

  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_USER: "agentcloud"
  DB_NAME: "agentcloud"
  DB_SSLMODE: "disable"

  REDIS_URL: "redis://redis:6379"

  SERVER_ADDRESS: ":8080"
  GRPC_ADDRESS: ":9090"
  GRPC_PUBLIC_ENDPOINT: "grpcs://dowork.l8ai.cn"
  DEBUG: "false"
  CORS_ALLOWED_ORIGINS: "*"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
  LOG_FILE: "/dev/stdout"
  EMAIL_PROVIDER: "console"
  ADMIN_ENABLED: "true"
  ACCESS_TOKEN_PRIVATE_KEY_FILE: "/app/access-token/private.pem"
  ACCESS_TOKEN_PUBLIC_KEY_FILE: "/app/access-token/public.pem"
  ACCESS_TOKEN_ISSUER: "https://dowork.l8ai.cn"
  ACCESS_TOKEN_AUDIENCES: "agentcloud-api,marketplace-api"
  ACCESS_TOKEN_CORE_AUDIENCE: "agentcloud-api"
  ACCESS_TOKEN_EXPIRATION_HOURS: "24"
  MARKETPLACE_HTTP_ADDRESS: ":8080"
  MARKETPLACE_IDENTITY_ISSUER: "https://dowork.l8ai.cn"
  MARKETPLACE_IDENTITY_AUDIENCE: "marketplace-api"
  MARKETPLACE_IDENTITY_JWKS_URL: "https://dowork.l8ai.cn/.well-known/jwks.json"
  MARKETPLACE_RUNTIME_BRIDGE_URL: "http://backend:8080/api/internal/marketplace/installations"

  # Object storage: in-cluster MinIO for the SDK, public host for presigned URLs.
  STORAGE_ENDPOINT: "minio:9000"
  STORAGE_PUBLIC_ENDPOINT: "minio.dowork.l8ai.cn"
  STORAGE_REGION: "us-east-1"
  STORAGE_BUCKET: "agentcloud"
  STORAGE_ACCESS_KEY: "minioadmin"
  STORAGE_USE_SSL: "false"
  STORAGE_PUBLIC_USE_SSL: "true"
  STORAGE_USE_PATH_STYLE: "true"
  STORAGE_MAX_FILE_SIZE: "10"

  KB_GITEA_URL: "http://gitea:3000"
  KB_GITEA_CLONE_URL: "http://gitea.agentcloud.svc.cluster.local:3000"
  KB_GITEA_SSH_URL: "ssh://git@gitea.agentcloud.svc.cluster.local:22"
  KB_GITEA_ORG: "am-kb"

  # PKI CA is mounted from the agentcloud-pki-ca secret at /app/ssl.
  PKI_CA_CERT_FILE: "/app/ssl/ca.crt"
  PKI_CA_KEY_FILE: "/app/ssl/ca.key"
  PKI_SERVER_CERT_FILE: "/data/server.crt"
  PKI_SERVER_KEY_FILE: "/data/server.key"
  PKI_VALIDITY_DAYS: "365"
