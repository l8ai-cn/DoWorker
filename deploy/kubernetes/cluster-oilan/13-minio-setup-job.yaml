apiVersion: batch/v1
kind: Job
metadata:
  name: minio-setup
  namespace: agentcloud
spec:
  backoffLimit: 10
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: minio-setup
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: agentcloud-regcred
      containers:
        - name: mc
          image: repo.aiedulab.cn:8443/agentcloud/mc:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentcloud-secrets
                  key: MINIO_ROOT_PASSWORD
          command:
            - sh
            - -c
            - |
              set -e
              until mc alias set am http://minio:9000 minioadmin "$MINIO_ROOT_PASSWORD"; do
                echo "waiting for minio..."; sleep 3
              done
              mc mb --ignore-existing am/agentcloud
              if ! mc ilm rule ls --json am/agentcloud |
                grep -q '"Expiration":{"Days":1}.*"Prefix":"workspace-artifacts/"'; then
                mc ilm rule add \
                  --prefix "workspace-artifacts/" \
                  --expire-days 1 \
                  am/agentcloud
              fi
              echo "bucket ready"
