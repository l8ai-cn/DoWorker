apiVersion: v1
kind: ServiceAccount
metadata:
  name: agentcloud-backend
  namespace: agentcloud
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agentcloud-runner-launcher
  namespace: agentcloud
rules:
  # The backend K8sLauncher (COORDINATOR_RUNNER_LAUNCHER=k8s) shells out to
  # kubectl to apply/delete Runner pods on demand.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agentcloud-runner-launcher
  namespace: agentcloud
subjects:
  - kind: ServiceAccount
    name: agentcloud-backend
    namespace: agentcloud
roleRef:
  kind: Role
  name: agentcloud-runner-launcher
  apiGroup: rbac.authorization.k8s.io
