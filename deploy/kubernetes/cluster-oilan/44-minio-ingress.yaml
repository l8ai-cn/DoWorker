apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-minio
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["minio.dowork.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: minio.dowork.l8ai.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
