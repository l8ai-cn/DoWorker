apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Long-running resources. Secrets + one-shot Jobs (migrate/seed/minio-setup) are
# applied out-of-band by deploy.sh (Jobs are immutable, secrets are generated).
namespace: agentsmesh

resources:
  - 00-namespace.yaml
  - 02-configmap.yaml
  - 10-postgres.yaml
  - 11-redis.yaml
  - 12-minio.yaml
  - 30-backend-rbac.yaml
  - 30-backend.yaml
  - 31-relay.yaml
  - 32-web.yaml
  - 33-web-admin.yaml
  - 34-runner-e2e-echo.yaml
  - 35-runner-claude.yaml
  - 36-runner-codex-cli.yaml
  - 37-runner-minimax-cli.yaml
  - 40-ingress.yaml
  - 60-prepull-daemonset.yaml
