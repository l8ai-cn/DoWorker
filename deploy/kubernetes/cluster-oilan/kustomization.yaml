apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Long-running resources. Secrets + seed/minio Jobs are applied out-of-band by
# deploy.sh because those resources are generated or immutable.
namespace: agentsmesh

components:
  - release

resources:
  - 00-namespace.yaml
  - 02-configmap.yaml
  - 10-postgres.yaml
  - 11-redis.yaml
  - 12-minio.yaml
  - 30-backend-rbac.yaml
  - 30-backend.yaml
  - 31-relay.yaml
  - 32-web.yaml
  - 33-web-admin.yaml
  - 34-runner-e2e-echo.yaml
  - 35-runner-claude.yaml
  - 36-runner-codex-cli.yaml
  - 37-runner-minimax-cli.yaml
  - 38-marketplace.yaml
  - 38-runner-grok-build.yaml
  - 39-runner-openclaw.yaml
  - 41-runner-hermes.yaml
  - 42-mobile.yaml
  - 40-ingress.yaml
  - 43-mobile-ingress.yaml
  - 60-prepull-daemonset.yaml
