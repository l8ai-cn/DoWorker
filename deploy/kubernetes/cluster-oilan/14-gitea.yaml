apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: gitea-data
  namespace: agentcloud
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitea
  namespace: agentcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gitea
  template:
    metadata:
      labels:
        app: gitea
    spec:
      imagePullSecrets:
        - name: agentcloud-regcred
      initContainers:
        - name: initialize-data-layout
          image: repo.aiedulab.cn:8443/library/gitea:1.21.0
          command:
            - /bin/sh
            - -ec
            - mkdir -p /data/gitea /data/git/repositories /data/git/lfs && chown -R 1000:1000 /data
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: gitea
          image: repo.aiedulab.cn:8443/library/gitea:1.21.0
          ports:
            - name: http
              containerPort: 3000
            - name: ssh
              containerPort: 22
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
            - name: GITEA__server__ROOT_URL
              value: "http://gitea.agentcloud.svc.cluster.local:3000/"
            - name: GITEA__server__SSH_DOMAIN
              value: "gitea.agentcloud.svc.cluster.local"
            - name: GITEA__server__SSH_PORT
              value: "22"
            - name: GITEA__repository__ROOT
              value: /data/git/repositories
            - name: GITEA__lfs__PATH
              value: /data/git/lfs
            - name: GITEA__database__DB_TYPE
              value: sqlite3
            - name: GITEA__database__PATH
              value: /data/gitea/gitea.db
            - name: GITEA__indexer__ISSUE_INDEXER_TYPE
              value: db
          readinessProbe:
            httpGet:
              path: /api/v1/version
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/version
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: gitea-data
---
apiVersion: v1
kind: Service
metadata:
  name: gitea
  namespace: agentcloud
spec:
  selector:
    app: gitea
  ports:
    - name: http
      port: 3000
      targetPort: http
    - name: ssh
      port: 22
      targetPort: ssh
