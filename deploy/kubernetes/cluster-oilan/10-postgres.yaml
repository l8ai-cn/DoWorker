apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: agentcloud
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: agentcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: repo.aiedulab.cn:8443/agentcloud/pgvector:pg16
          imagePullPolicy: Always
          env:
            - name: POSTGRES_USER
              value: agentcloud
            - name: POSTGRES_DB
              value: agentcloud
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentcloud-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U agentcloud"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 2Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-data
      imagePullSecrets:
        - name: agentcloud-regcred
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: agentcloud
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
