apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: agentsmesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: web
          image: repo.aiedulab.cn:8443/agentsmesh/web@sha256:6e029addd9c5f00c037174893ecf15a7ea01c42a2436c3f6390fdf07f2ccb5fa
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: PRIMARY_DOMAIN
              value: "dowork.l8ai.cn"
            - name: USE_HTTPS
              value: "true"
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: agentsmesh
spec:
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
