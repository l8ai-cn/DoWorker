apiVersion: batch/v1
kind: Job
metadata:
  name: operator-catalog-bootstrap
  namespace: agentcloud
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app: operator-catalog-bootstrap
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: agentcloud-regcred
      containers:
        - name: bootstrap
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          command:
            - /app/server
            - bootstrap-marketplace
            - --organization
            - dev-org
            - --publisher
            - admin@agentcloud.local
            - --reviewer
            - admin@agentcloud.local
            - --model-resource-id
            - "1"
            - --runtime-image-id
            - "4"
          envFrom:
            - configMapRef:
                name: agentcloud-config
            - secretRef:
                name: agentcloud-secrets
          volumeMounts:
            - name: pki-ca
              mountPath: /app/ssl
              readOnly: true
            - name: access-token
              mountPath: /app/access-token
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: pki-ca
          secret:
            secretName: agentcloud-pki-ca
        - name: access-token
          secret:
            secretName: agentcloud-access-token
        - name: data
          emptyDir: {}
