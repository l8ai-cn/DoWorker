apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: agentsmesh
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: migrate
          image: repo.aiedulab.cn:8443/agentsmesh/backend:latest
          imagePullPolicy: Always
          command: ["/app/server", "migrate", "up"]
          envFrom:
            - configMapRef:
                name: agentsmesh-config
            - secretRef:
                name: agentsmesh-secrets
