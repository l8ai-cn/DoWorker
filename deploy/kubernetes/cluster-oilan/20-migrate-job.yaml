apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: agentsmesh
  annotations:
    agentsmesh.ai/verified-image-digest: "sha256:452a8b053be8d479d9ad1b2581fcef251864d2228e913a67c07a5b34bcea8b80"
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: migrate
          image: repo.aiedulab.cn:8443/agentsmesh/backend@sha256:452a8b053be8d479d9ad1b2581fcef251864d2228e913a67c07a5b34bcea8b80
          imagePullPolicy: Always
          command: ["/app/server", "migrate", "up"]
          envFrom:
            - configMapRef:
                name: agentsmesh-config
            - secretRef:
                name: agentsmesh-secrets
