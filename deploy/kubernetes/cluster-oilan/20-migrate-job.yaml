apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: agentsmesh
  annotations:
    agentsmesh.ai/verified-image-digest: "__BACKEND_DIGEST__"
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrate
      annotations:
        agentsmesh.ai/verified-image-digest: "__BACKEND_DIGEST__"
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: migrate
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          command: ["/app/server", "migrate", "up"]
          envFrom:
            - configMapRef:
                name: agentsmesh-config
            - secretRef:
                name: agentsmesh-secrets
