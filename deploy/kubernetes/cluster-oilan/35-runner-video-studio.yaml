apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner-video-studio
  namespace: agentsmesh
  labels:
    app.kubernetes.io/name: agentsmesh-runner
    agentsmesh.io/runtime: video-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runner-video-studio
  template:
    metadata:
      labels:
        app: runner-video-studio
        app.kubernetes.io/name: agentsmesh-runner
        agentsmesh.io/runtime: video-studio
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: runner
          image: repo.aiedulab.cn:8443/agentsmesh/runner-video-studio@sha256:760c2b9684fcbc7c5ae0d237d6f15464d052090048ee9daffc085fde59d2cb22
          imagePullPolicy: Always
          command: ["/usr/local/bin/runner-entrypoint.sh"]
          env:
            - name: HOME
              value: /home/runner
            - name: RUNNER_NODE_ID
              value: dev-runner-video-studio
            - name: RUNNER_ORG_SLUG
              value: dev-org
            - name: AGENT_RUNTIME
              value: video-studio
            - name: DEFAULT_AGENT
              value: video-studio
            - name: BACKEND_URL
              value: http://backend:8080
            - name: GRPC_ENDPOINT
              value: backend:9090
            - name: RELAY_BASE_URL
              value: ws://relay:8090
            - name: MAX_CONCURRENT_PODS
              value: "1"
            - name: SSL_DIR
              value: /app/ssl
          volumeMounts:
            - name: ssl
              mountPath: /app/ssl
              readOnly: true
            - name: home
              mountPath: /home/runner
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
              ephemeral-storage: 5Gi
            limits:
              cpu: "4"
              memory: 6Gi
              ephemeral-storage: 52Gi
      volumes:
        - name: ssl
          secret:
            secretName: agentsmesh-pki-ca
        - name: home
          emptyDir:
            sizeLimit: 2Gi
        - name: workspace
          emptyDir:
            sizeLimit: 50Gi
