apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner-codex-cli
  namespace: agentsmesh
  labels:
    app.kubernetes.io/name: agentsmesh-runner
    agentsmesh.io/runtime: codex-cli
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runner-codex-cli
  template:
    metadata:
      labels:
        app: runner-codex-cli
        app.kubernetes.io/name: agentsmesh-runner
        agentsmesh.io/runtime: codex-cli
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: runner
          image: repo.aiedulab.cn:8443/agentsmesh/runner-codex-cli@sha256:854952254d5f7ce25db3258034bc71a07169a5730dfe0670243fc10ea437bacd
          imagePullPolicy: Always
          command: ["/usr/local/bin/runner-entrypoint.sh"]
          env:
            - name: HOME
              value: /home/runner
            - name: RUNNER_NODE_ID
              value: dev-runner-codex
            - name: RUNNER_ORG_SLUG
              value: dev-org
            - name: AGENT_RUNTIME
              value: codex-cli
            - name: DEFAULT_AGENT
              value: codex-cli
            - name: BACKEND_URL
              value: http://backend:8080
            - name: GRPC_ENDPOINT
              value: backend:9090
            - name: RELAY_BASE_URL
              value: ws://relay:8090
            - name: MAX_CONCURRENT_PODS
              value: "10"
            - name: SSL_DIR
              value: /app/ssl
          envFrom:
            - secretRef:
                name: agentsmesh-runner-api-keys
                optional: true
          volumeMounts:
            - name: ssl
              mountPath: /app/ssl
              readOnly: true
            - name: home
              mountPath: /home/runner
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: ssl
          secret:
            secretName: agentsmesh-pki-ca
        - name: home
          emptyDir: {}
        - name: workspace
          emptyDir: {}
