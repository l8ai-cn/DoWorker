apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentcloud-mobile
  namespace: agentcloud
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["mobile.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: mobile.l8ai.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mobile
                port:
                  number: 3000
