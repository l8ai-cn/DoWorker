apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: agentcloud
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: agentcloud
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: repo.aiedulab.cn:8443/agentcloud/redis:7-alpine
          imagePullPolicy: Always
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
      imagePullSecrets:
        - name: agentcloud-regcred
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: agentcloud
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
