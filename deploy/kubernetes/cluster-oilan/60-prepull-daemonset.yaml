# Keeps runner images used by coordinator-launched Workers resident on every node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agentsmesh-image-prepull
  namespace: agentsmesh
spec:
  selector:
    matchLabels:
      app: agentsmesh-image-prepull
  template:
    metadata:
      labels:
        app: agentsmesh-image-prepull
    spec:
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: hold
          image: repo.aiedulab.cn:8443/agentsmesh/runner-e2e-echo@sha256:077eb4511113ddb80dd8e09d7b46ffe3668d6b69d1840c1cbe849e97595087fa
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
        - name: do-agent
          image: repo.aiedulab.cn:8443/agentsmesh/runner-do-agent@sha256:1792eaeb4f4da7fd103a54950893817077dd8986931422ad2a83e09bf4bac653
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
        - name: video-studio
          image: repo.aiedulab.cn:8443/agentsmesh/runner-video-studio@sha256:f3463bc567f1ed8516486e95e17d50f48834275aae7931221b1a3eeb3c526a5d
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
