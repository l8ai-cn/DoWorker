# Warms the containerd image cache on every node so coordinator-launched
# runner/worker pods start instantly (no first-pull latency). Each initContainer
# forces a pull of one agent-runtime image; the main container keeps the e2e-echo
# image resident.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agentsmesh-image-prepull
  namespace: agentsmesh
spec:
  selector:
    matchLabels:
      app: agentsmesh-image-prepull
  template:
    metadata:
      labels:
        app: agentsmesh-image-prepull
    spec:
      imagePullSecrets:
        - name: agentsmesh-regcred
      initContainers:
        - name: pull-claude
          image: repo.aiedulab.cn:8443/agentsmesh/runner-claude-code@sha256:257f09676dd9d612c3b56be7aee129a06e4c0b6096e56203620aa7863b219f40
          imagePullPolicy: IfNotPresent
          command: ["true"]
        - name: pull-codex
          image: repo.aiedulab.cn:8443/agentsmesh/runner-codex-cli@sha256:854952254d5f7ce25db3258034bc71a07169a5730dfe0670243fc10ea437bacd
          imagePullPolicy: IfNotPresent
          command: ["true"]
        - name: pull-gemini
          image: repo.aiedulab.cn:8443/agentsmesh/runner-gemini-cli@sha256:f67425c616f91a8ab3f70c1d3e0b49856ec8321ab6a9d43df193e0617b5a7bd5
          imagePullPolicy: IfNotPresent
          command: ["true"]
      containers:
        - name: hold
          image: repo.aiedulab.cn:8443/agentsmesh/runner-e2e-echo@sha256:077eb4511113ddb80dd8e09d7b46ffe3668d6b69d1840c1cbe849e97595087fa
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
