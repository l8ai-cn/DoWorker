# Keeps the internally tested e2e-echo runner image resident on every node.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: agentsmesh-image-prepull
  namespace: agentsmesh
spec:
  selector:
    matchLabels:
      app: agentsmesh-image-prepull
  template:
    metadata:
      labels:
        app: agentsmesh-image-prepull
    spec:
      imagePullSecrets:
        - name: agentsmesh-regcred
      initContainers:
        - name: pull-video-studio
          image: repo.aiedulab.cn:8443/agentsmesh/runner-video-studio@sha256:760c2b9684fcbc7c5ae0d237d6f15464d052090048ee9daffc085fde59d2cb22
          imagePullPolicy: IfNotPresent
          command: ["true"]
      containers:
        - name: hold
          image: repo.aiedulab.cn:8443/agentsmesh/runner-e2e-echo@sha256:077eb4511113ddb80dd8e09d7b46ffe3668d6b69d1840c1cbe849e97595087fa
          imagePullPolicy: IfNotPresent
          command: ["sleep", "infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              memory: 64Mi
