apiVersion: apps/v1
kind: Deployment
metadata:
  name: relay
  namespace: agentcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: relay
  template:
    metadata:
      labels:
        app: relay
    spec:
      imagePullSecrets:
        - name: agentcloud-regcred
      containers:
        - name: relay
          image: repo.aiedulab.cn:8443/agentcloud/relay@sha256:c9ba960b7fd6f9d6456dc52c549cbbaf7f939b9d599c8d6e71600995db177d93
          imagePullPolicy: Always
          ports:
            - containerPort: 8090
          env:
            - name: SERVER_ADDRESS
              value: ":8090"
            - name: BACKEND_URL
              value: "http://backend:8080"
            - name: PRIMARY_DOMAIN
              value: "dowork.l8ai.cn"
            - name: PREVIEW_PUBLIC_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: agentcloud-config
                  key: PREVIEW_PUBLIC_ORIGIN
            - name: PREVIEW_COOKIE_MODE
              valueFrom:
                configMapKeyRef:
                  name: agentcloud-config
                  key: PREVIEW_COOKIE_MODE
            - name: USE_HTTPS
              value: "true"
            - name: ALLOWED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: agentcloud-config
                  key: RELAY_ALLOWED_ORIGINS
            - name: RELAY_ID
              value: "k8s-relay-1"
            - name: RELAY_REGION
              value: "cluster-oilan"
            - name: RELAY_CAPACITY
              value: "1000"
            - name: SESSION_KEEP_ALIVE_DURATION
              value: "30s"
            - name: DEBUG
              value: "false"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentcloud-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: agentcloud-secrets
                  key: INTERNAL_API_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: relay
  namespace: agentcloud
spec:
  selector:
    app: relay
  ports:
    - port: 8090
      targetPort: 8090
