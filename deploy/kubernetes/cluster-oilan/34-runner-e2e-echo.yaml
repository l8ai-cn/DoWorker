apiVersion: apps/v1
kind: Deployment
metadata:
  name: runner-e2e-echo
  namespace: agentsmesh
  labels:
    app.kubernetes.io/name: agentsmesh-runner
    agentsmesh.io/runtime: e2e-echo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runner-e2e-echo
  template:
    metadata:
      labels:
        app: runner-e2e-echo
        app.kubernetes.io/name: agentsmesh-runner
        agentsmesh.io/runtime: e2e-echo
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: runner
          image: repo.aiedulab.cn:8443/agentsmesh/runner-e2e-echo@sha256:077eb4511113ddb80dd8e09d7b46ffe3668d6b69d1840c1cbe849e97595087fa
          imagePullPolicy: Always
          command: ["/usr/local/bin/runner-entrypoint.sh"]
          env:
            - name: HOME
              value: /home/runner
            - name: RUNNER_NODE_ID
              value: dev-runner
            - name: RUNNER_ORG_SLUG
              value: dev-org
            - name: AGENT_RUNTIME
              value: e2e-echo
            - name: DEFAULT_AGENT
              value: e2e-echo
            - name: BACKEND_URL
              value: http://backend:8080
            - name: GRPC_ENDPOINT
              value: backend:9090
            - name: RELAY_BASE_URL
              value: ws://relay:8090
            - name: MAX_CONCURRENT_PODS
              value: "10"
            - name: SSL_DIR
              value: /app/ssl
          volumeMounts:
            - name: ssl
              mountPath: /app/ssl
              readOnly: true
            - name: home
              mountPath: /home/runner
            - name: workspace
              mountPath: /workspace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi
      volumes:
        - name: ssl
          secret:
            secretName: agentsmesh-pki-ca
        - name: home
          emptyDir: {}
        - name: workspace
          emptyDir: {}
