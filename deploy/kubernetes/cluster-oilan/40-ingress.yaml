apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["doworker.l8an.cn"]
      secretName: l8an-wildcard-tls
  rules:
    - host: doworker.l8an.cn
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /proto.
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-admin
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["admin.doworker.l8an.cn"]
      secretName: l8an-wildcard-tls
  rules:
    - host: admin.doworker.l8an.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-admin
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-relay
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["doworker.l8an.cn"]
      secretName: l8an-wildcard-tls
  rules:
    - host: doworker.l8an.cn
      http:
        paths:
          - path: /relay(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-preview
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["doworker.l8an.cn"]
      secretName: l8an-wildcard-tls
  rules:
    - host: doworker.l8an.cn
      http:
        paths:
          - path: /preview
            pathType: Prefix
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
