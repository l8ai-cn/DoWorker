apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-dowork
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["dowork.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: dowork.l8ai.cn
      http:
        paths:
          - path: /api/marketplace/v1
            pathType: Prefix
            backend:
              service:
                name: marketplace
                port:
                  number: 8080
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /proto.
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /.well-known
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-marketplace
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["market.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: market.l8ai.cn
      http:
        paths:
          - path: /api/marketplace/v1
            pathType: Prefix
            backend:
              service:
                name: marketplace
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: marketplace-web
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-admin
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["admin.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: admin.l8ai.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-admin
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-dowork-relay
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["dowork.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: dowork.l8ai.cn
      http:
        paths:
          - path: /relay(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-dowork-tunnel
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["dowork.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: dowork.l8ai.cn
      http:
        paths:
          - path: /runner/tunnel
            pathType: Prefix
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-minio
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["minio.dowork.l8ai.cn"]
      secretName: l8ai-wildcard-tls
  rules:
    - host: minio.dowork.l8ai.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
