apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["agentsmesh.aiedulab.cn"]
      secretName: aiedulab-wildcard-tls
  rules:
    - host: agentsmesh.aiedulab.cn
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /proto.
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-admin
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["agentsmesh-admin.aiedulab.cn"]
      secretName: aiedulab-wildcard-tls
  rules:
    - host: agentsmesh-admin.aiedulab.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-admin
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-relay
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["agentsmesh.aiedulab.cn"]
      secretName: aiedulab-wildcard-tls
  rules:
    - host: agentsmesh.aiedulab.cn
      http:
        paths:
          - path: /relay(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
# Gateway HTTP data plane (tunnel/preview). The /preview prefix is kept
# (no rewrite-target) because the gateway's own mux routes on the full
# /preview/{podKey}/* path. proxy-buffering is disabled so SSE and video
# responses stream through immediately instead of being held in nginx's
# response buffer, and read/send timeouts are raised to cover long-lived
# runner tunnel WebSocket / preview WebSocket / video sessions. ingress-nginx
# passes through the Upgrade/Connection headers for any backend by default,
# so no extra annotation is required for WebSocket upgrades.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-preview
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["doworker.l8an.cn"]
      secretName: l8an-wildcard-tls
  rules:
    - host: doworker.l8an.cn
      http:
        paths:
          - path: /preview
            pathType: Prefix
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
# Runner outbound tunnel endpoint. backend's cfg.TunnelURL() /
# tunnelURLFromRelay() both mint "{scheme}://{host}/runner/tunnel" (a bare,
# top-level path — NOT nested under /relay's rewrite-target strip), so it
# needs its own ingress rule alongside agentsmesh-relay above.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-runner-tunnel
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["doworker.l8an.cn"]
      secretName: l8an-wildcard-tls
  rules:
    - host: doworker.l8an.cn
      http:
        paths:
          - path: /runner/tunnel
            pathType: Prefix
            backend:
              service:
                name: relay
                port:
                  number: 8090
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentsmesh-minio
  namespace: agentsmesh
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["agentsmesh-minio.aiedulab.cn"]
      secretName: aiedulab-wildcard-tls
  rules:
    - host: agentsmesh-minio.aiedulab.cn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio
                port:
                  number: 9000
