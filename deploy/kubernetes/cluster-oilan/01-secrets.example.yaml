# Reference only. Real secrets are generated by deploy.sh (never committed):
#
#   agentsmesh-secrets   opaque       DB_PASSWORD / JWT_SECRET / INTERNAL_API_SECRET /
#                                     MINIO_ROOT_PASSWORD / STORAGE_SECRET_KEY
#   agentsmesh-pki-ca    opaque       ca.crt + ca.key (runner mTLS CA, shared by
#                                     backend PKI and every runner pod's /app/ssl)
#   agentsmesh-regcred   dockercfg    pull creds for repo.aiedulab.cn:8443
#   aiedulab-wildcard-tls kubernetes.io/tls  copied from the default namespace
#
# deploy.sh creates them with `kubectl create secret ... --dry-run=client -o yaml | kubectl apply -f -`
apiVersion: v1
kind: Secret
metadata:
  name: agentsmesh-secrets
  namespace: agentsmesh
type: Opaque
stringData:
  DB_PASSWORD: "__CHANGE_ME__"
  JWT_SECRET: "__CHANGE_ME__"
  INTERNAL_API_SECRET: "__CHANGE_ME__"
  MINIO_ROOT_PASSWORD: "__CHANGE_ME__"
  STORAGE_SECRET_KEY: "__CHANGE_ME__"
