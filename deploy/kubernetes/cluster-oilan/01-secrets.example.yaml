# Reference only. Real secrets are generated by deploy.sh (never committed):
#
#   agentcloud-secrets   opaque       DB_PASSWORD / JWT_SECRET / INTERNAL_API_SECRET /
#                                     MINIO_ROOT_PASSWORD / STORAGE_SECRET_KEY
#   agentcloud-pki-ca    opaque       ca.crt + ca.key (runner mTLS CA, shared by
#                                     backend PKI and every runner pod's /app/ssl)
#   agentcloud-access-token opaque    private.pem + public.pem (Core Auth RS256)
#   agentcloud-regcred   dockercfg    pull creds for repo.aiedulab.cn:8443
#   l8ai-wildcard-tls     kubernetes.io/tls  copied from the default namespace
#
# deploy.sh writes mode-0600 data manifests into an ephemeral DoOps release snapshot.
apiVersion: v1
kind: Secret
metadata:
  name: agentcloud-secrets
  namespace: agentcloud
type: Opaque
stringData:
  DB_PASSWORD: "__CHANGE_ME__"
  JWT_SECRET: "__CHANGE_ME__"
  ACCESS_TOKEN_KEY_ID: "oilan-__PUBLIC_KEY_FINGERPRINT__"
  MARKETPLACE_DATABASE_URL: "postgres://agentcloud:__CHANGE_ME__@postgres:5432/agentcloud?sslmode=disable"
  MARKETPLACE_MIGRATION_DATABASE_URL: "postgres://agentcloud:__CHANGE_ME__@postgres:5432/agentcloud?sslmode=disable&x-migrations-table=marketplace_schema_migrations"
  INTERNAL_API_SECRET: "__CHANGE_ME__"
  MINIO_ROOT_PASSWORD: "__CHANGE_ME__"
  STORAGE_SECRET_KEY: "__CHANGE_ME__"
