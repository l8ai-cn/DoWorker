apiVersion: batch/v1
kind: Job
metadata:
  name: worker-definition-sync
  namespace: agentcloud
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: worker-definition-sync
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: agentcloud-regcred
      containers:
        - name: worker-definition-sync
          image: __BACKEND_IMAGE__
          imagePullPolicy: Always
          command: ["/app/worker-definition-sync"]
          envFrom:
            - configMapRef:
                name: agentcloud-config
            - secretRef:
                name: agentcloud-secrets
