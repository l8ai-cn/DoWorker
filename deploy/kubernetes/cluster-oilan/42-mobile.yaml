apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile
  namespace: agentsmesh
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile
  template:
    metadata:
      labels:
        app: mobile
    spec:
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: mobile
          image: repo.aiedulab.cn:8443/agentsmesh/mobile@sha256:1601e7213f2b8fe06e8fe5612de5a0d0bd274ac8deabaafc709fdc5242dce42e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mobile
  namespace: agentsmesh
spec:
  selector:
    app: mobile
  ports:
    - port: 3000
      targetPort: 3000
