apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile
  namespace: agentcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mobile
  template:
    metadata:
      labels:
        app: mobile
    spec:
      imagePullSecrets:
        - name: agentcloud-regcred
      containers:
        - name: mobile
          image: repo.aiedulab.cn:8443/agentcloud/mobile@sha256:d5f9e3a6761a87583e73f8329414a492e7bc92adcb027c22f0ffb6173f748051
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 8
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mobile
  namespace: agentcloud
spec:
  selector:
    app: mobile
  ports:
    - port: 3000
      targetPort: 3000
