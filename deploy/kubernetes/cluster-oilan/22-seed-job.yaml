apiVersion: batch/v1
kind: Job
metadata:
  name: seed
  namespace: agentsmesh
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: seed
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: agentsmesh-regcred
      containers:
        - name: seed
          image: repo.aiedulab.cn:8443/agentsmesh/pgvector:pg16
          imagePullPolicy: IfNotPresent
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: agentsmesh-secrets
                  key: DB_PASSWORD
          command:
            - sh
            - -c
            - |
              set -e
              until pg_isready -h postgres -U agentsmesh; do echo "waiting for db"; sleep 3; done
              psql -h postgres -U agentsmesh -d agentsmesh -v ON_ERROR_STOP=1 -f /seed/seed.sql
          volumeMounts:
            - name: seed
              mountPath: /seed
      volumes:
        - name: seed
          configMap:
            name: agentsmesh-seed
