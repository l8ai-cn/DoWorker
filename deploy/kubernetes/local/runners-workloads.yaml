apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    agentcloud.io/runtime: claude-code
  name: runner-claude-code
  namespace: agentcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: runner-claude-code
  template:
    metadata:
      labels:
        agentcloud.io/runtime: claude-code
        app: runner-claude-code
    spec:
      containers:
      - command:
        - /usr/local/bin/runner-entrypoint.sh
        env:
        - name: RUNNER_NODE_ID
          value: dev-runner-claude
        - name: AGENT_RUNTIME
          value: claude-code
        - name: DEFAULT_AGENT
          value: claude-code
        envFrom:
        - configMapRef:
            name: agentcloud-runner-env
        - secretRef:
            name: agentcloud-runner-api-keys
            optional: true
        image: __COMPOSE_PROJECT_NAME__-runner-claude-code:latest
        imagePullPolicy: Never
        name: runner
        volumeMounts:
        - mountPath: /app/ssl
          name: ssl
          readOnly: true
        - mountPath: /usr/local/bin/runner-entrypoint.sh
          name: entrypoint
          readOnly: true
          subPath: runner-entrypoint.sh
        - mountPath: /workspace
          name: workspace
        - mountPath: /home/runner/.agent-cloud
          name: agentcloud-config
        - mountPath: /home/runner/.claude
          name: agent-config
        - mountPath: /run/runner-ssh-source
          name: runner-ssh
          readOnly: true
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsUser: 1000
      volumes:
      - name: ssl
        secret:
          secretName: agentcloud-dev-ca
      - configMap:
          defaultMode: 493
          name: runner-entrypoint
        name: entrypoint
      - name: workspace
        persistentVolumeClaim:
          claimName: runner-claude-workspace
      - name: agentcloud-config
        persistentVolumeClaim:
          claimName: runner-claude-agentcloud-config
      - name: agent-config
        persistentVolumeClaim:
          claimName: runner-claude-config
      - name: runner-ssh
        secret:
          defaultMode: 384
          secretName: agentcloud-runner-ssh
---
