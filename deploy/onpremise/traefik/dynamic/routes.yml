# =============================================================================
# Traefik Dynamic Routing Configuration
# =============================================================================
#
# All HTTP routes for AgentsMesh services
# File-based configuration (no Docker socket required)
#
# =============================================================================

http:
  routers:
    preview:
      rule: "HostRegexp(`^[a-z0-9-]+\\.{{ env \"PREVIEW_HOST_REGEX\" }}$`) && PathPrefix(`/preview`)"
      entryPoints:
        - web
      service: relay
      priority: 120

    preview-isolation:
      rule: "HostRegexp(`^[a-z0-9-]+\\.{{ env \"PREVIEW_HOST_REGEX\" }}$`)"
      entryPoints:
        - web
      service: relay
      middlewares:
        - preview-deny-path
      priority: 110

    tunnel:
      rule: "PathPrefix(`/runner/tunnel`)"
      entryPoints:
        - web
      service: relay
      priority: 100

    # =========================================================================
    # Backend API
    # =========================================================================
    api:
      rule: "PathPrefix(`/api`) || PathPrefix(`/health`)"
      entryPoints:
        - web
      service: backend
      priority: 100

    # =========================================================================
    # Relay (WebSocket for terminal streaming)
    # =========================================================================
    relay:
      rule: "PathPrefix(`/relay`)"
      entryPoints:
        - web
      service: relay
      middlewares:
        - relay-strip
      priority: 90

    # =========================================================================
    # Web Frontend (catch-all, lowest priority)
    # =========================================================================
    web:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - web
      service: web
      priority: 1

  # ===========================================================================
  # Services
  # ===========================================================================
  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8080"

    relay:
      loadBalancer:
        servers:
          - url: "http://relay:8090"

    web:
      loadBalancer:
        servers:
          - url: "http://web:3000"

  # ===========================================================================
  # Middlewares
  # ===========================================================================
  middlewares:
    preview-deny-path:
      replacePath:
        path: "/__preview_not_found__"

    relay-strip:
      stripPrefix:
        prefixes:
          - "/relay"
