// UserCredentialService — user-scoped credential management.
//
// Migrated from REST handlers in backend/internal/api/rest/v1/user_git_credentials*.go,
// user_agent_credentials*.go, user_repository_providers*.go per
// .claude/plans/proto-naming-conventions.md. Conventions enforced:
//   * package proto.user_credential.v1 + go_package suffix for dispatch
//   * service names = <Domain>Service, methods PascalCase verbs
//   * snake_case fields, no json_name annotations
//   * USER-SCOPED service: no org_slug = 1 (conventions §3.5 exception #1)
//   * timestamps as string ISO-8601 (no google.protobuf.Timestamp)
//   * list response = {items, total, limit, offset} uniform envelope
//   * create/update return entity directly (no {credential: ...} wrapper)
//
// PR #329 lineage: RepositoryProvider keeps `is_active`, `has_identity`,
// `has_bot_token`, `has_client_id` fields. The Rust DTO drift on these flags
// is fixed at the .proto SSOT.
//
// Two services share this package because GitCredential references
// RepositoryProvider and both enforce the same user-scope auth boundary.
//
// SENSITIVE DATA: PAT, SSH private key, OAuth secret never appear on the
// wire. Server-side handlers omit them (mirrors `json:"-"` on the GORM
// struct). The proto messages here describe ONLY the response shape, so
// secrets physically cannot leave the server.

syntax = "proto3";

package proto.user_credential.v1;

import "codegen/v1/options.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/user_credential/v1;usercredentialv1";

// Convert codegen target — emits user_credential_convert.amesh.go into the
// backend connect handler tree so it can reach the domain layer (which
// proto/gen/go packages cannot import under Go's internal-package rule).
option (amesh.codegen.v1.convert_target) = {
  output_dir: "backend/internal/api/connect/user_credential"
  output_package: "usercredentialconnect"
};

// ============================================================================
// UserGitCredentialService — Git credentials (PAT / SSH / OAuth ref / runner_local)
// ============================================================================
service UserGitCredentialService {
  rpc ListGitCredentials(ListGitCredentialsRequest) returns (ListGitCredentialsResponse);
  rpc GetGitCredential(GetGitCredentialRequest) returns (GitCredential);
  rpc CreateGitCredential(CreateGitCredentialRequest) returns (GitCredential);
  rpc UpdateGitCredential(UpdateGitCredentialRequest) returns (GitCredential);
  rpc DeleteGitCredential(DeleteGitCredentialRequest) returns (DeleteGitCredentialResponse);

  rpc GetDefaultGitCredential(GetDefaultGitCredentialRequest) returns (GetDefaultGitCredentialResponse);
  rpc SetDefaultGitCredential(SetDefaultGitCredentialRequest) returns (SetDefaultGitCredentialResponse);
  rpc ClearDefaultGitCredential(ClearDefaultGitCredentialRequest) returns (ClearDefaultGitCredentialResponse);
}

// GitCredential mirrors backend/internal/domain/user/GitCredential.ToResponse().
// SENSITIVE fields (pat_encrypted, private_key_encrypted) are intentionally
// absent — never leave the server.
message GitCredential {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/user.GitCredentialResponse"
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string name = 2;
  // runner_local / oauth / pat / ssh_key
  string credential_type = 3;
  optional int64 repository_provider_id = 4 [(amesh.codegen.v1.field_rename) = "RepositoryProviderID"];
  optional string provider_name = 5 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string public_key = 6 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string fingerprint = 7 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  optional string host_pattern = 8 [(amesh.codegen.v1.field_convert) = "string_ptr"];
  bool is_default = 9;
  string created_at = 10;
  string updated_at = 11;
}

message ListGitCredentialsRequest {}

// List response envelope per conventions §8 — `items, total, limit, offset`.
// Includes the virtual `runner_local` option which is not stored but always
// returned by REST (user_git_credentials.go:67). The `runner_local_is_default`
// flag mirrors REST's `runner_local.is_default` toggle.
message ListGitCredentialsResponse {
  repeated GitCredential items = 1;
  int64 total = 2;
  int32 limit = 3;
  int32 offset = 4;
  // True when no explicit default is set (server falls back to runner_local).
  bool runner_local_is_default = 5;
}

message GetGitCredentialRequest {
  int64 id = 1;
}

message CreateGitCredentialRequest {
  string name = 1;
  // runner_local / oauth / pat / ssh_key
  string credential_type = 2;
  optional int64 repository_provider_id = 3;
  // Sensitive secret — request only, never echoed back.
  optional string pat = 4;
  optional string private_key = 5;
  optional string host_pattern = 6;
}

message UpdateGitCredentialRequest {
  int64 id = 1;
  optional string name = 2;
  optional string pat = 3;
  optional string private_key = 4;
  optional string host_pattern = 5;
}

message DeleteGitCredentialRequest {
  int64 id = 1;
}

message DeleteGitCredentialResponse {}

message GetDefaultGitCredentialRequest {}

// REST returns either the credential or a virtual runner_local. Connect
// expresses this with explicit fields — `is_runner_local` signals which
// branch the server picked.
message GetDefaultGitCredentialResponse {
  optional GitCredential credential = 1;
  bool is_runner_local = 2;
}

// credential_id absent → set runner_local as default (clears stored default).
message SetDefaultGitCredentialRequest {
  optional int64 credential_id = 1;
}

message SetDefaultGitCredentialResponse {
  bool is_runner_local = 1;
}

message ClearDefaultGitCredentialRequest {}

message ClearDefaultGitCredentialResponse {}

// ============================================================================
// UserRepositoryProviderService — OAuth/Bot Token git provider connections
// ============================================================================
service UserRepositoryProviderService {
  rpc ListRepositoryProviders(ListRepositoryProvidersRequest) returns (ListRepositoryProvidersResponse);
  rpc GetRepositoryProvider(GetRepositoryProviderRequest) returns (RepositoryProvider);
  rpc CreateRepositoryProvider(CreateRepositoryProviderRequest) returns (RepositoryProvider);
  rpc UpdateRepositoryProvider(UpdateRepositoryProviderRequest) returns (RepositoryProvider);
  rpc DeleteRepositoryProvider(DeleteRepositoryProviderRequest) returns (DeleteRepositoryProviderResponse);
  rpc SetDefaultRepositoryProvider(SetDefaultRepositoryProviderRequest) returns (SetDefaultRepositoryProviderResponse);
  rpc TestRepositoryProviderConnection(TestRepositoryProviderConnectionRequest) returns (TestRepositoryProviderConnectionResponse);
  rpc ListProviderRepositories(ListProviderRepositoriesRequest) returns (ListProviderRepositoriesResponse);
}

// RepositoryProvider mirrors user.RepositoryProviderResponse — boolean
// indicator fields (has_client_id, has_bot_token, has_identity) flag whether
// the secret is configured, the secret itself never leaves the server.
message RepositoryProvider {
  option (amesh.codegen.v1.go_domain) = {
    type: "github.com/anthropics/agentsmesh/backend/internal/domain/user.RepositoryProviderResponse"
  };

  int64 id = 1 [(amesh.codegen.v1.field_rename) = "ID"];
  string provider_type = 2;
  string name = 3;
  string base_url = 4 [(amesh.codegen.v1.field_rename) = "BaseURL"];
  bool has_client_id = 5 [(amesh.codegen.v1.field_rename) = "HasClientID"];
  bool has_bot_token = 6;
  bool has_identity = 7;
  bool is_default = 8;
  bool is_active = 9;
  string created_at = 10;
  string updated_at = 11;
}

message ListRepositoryProvidersRequest {}

message ListRepositoryProvidersResponse {
  repeated RepositoryProvider items = 1;
  int64 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message GetRepositoryProviderRequest {
  int64 id = 1;
}

message CreateRepositoryProviderRequest {
  string provider_type = 1;
  string name = 2;
  string base_url = 3;
  // OAuth client id (public — not a secret, surfaced via has_client_id).
  optional string client_id = 4;
  // Sensitive secret — request only, never echoed back.
  optional string client_secret = 5;
  optional string bot_token = 6;
}

message UpdateRepositoryProviderRequest {
  int64 id = 1;
  optional string name = 2;
  optional string base_url = 3;
  optional string client_id = 4;
  optional string client_secret = 5;
  optional string bot_token = 6;
  optional bool is_active = 7;
}

message DeleteRepositoryProviderRequest {
  int64 id = 1;
}

message DeleteRepositoryProviderResponse {}

message SetDefaultRepositoryProviderRequest {
  int64 id = 1;
}

message SetDefaultRepositoryProviderResponse {}

message TestRepositoryProviderConnectionRequest {
  int64 id = 1;
}

message TestRepositoryProviderConnectionResponse {
  bool success = 1;
  string message = 2;
}

// ProviderRepository mirrors REST RepositoryResponse — a repository fetched
// from the provider's API, not yet imported.
message ProviderRepository {
  string id = 1;
  string name = 2;
  string slug = 3;
  string description = 4;
  string default_branch = 5;
  string visibility = 6;
  string http_clone_url = 7;
  string ssh_clone_url = 8;
  string web_url = 9;
}

message ListProviderRepositoriesRequest {
  int64 id = 1;
  optional int32 page = 2;
  optional int32 per_page = 3;
  optional string search = 4;
}

message ListProviderRepositoriesResponse {
  repeated ProviderRepository items = 1;
  int64 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}
