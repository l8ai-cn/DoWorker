syntax = "proto3";

package proto.orchestration_resource.v1;

option go_package = "github.com/l8ai-cn/agentcloud/proto/gen/go/orchestration_resource/v1;orchestrationresourcev1";

enum SourceFormat {
  SOURCE_FORMAT_UNSPECIFIED = 0;
  SOURCE_FORMAT_JSON = 1;
  SOURCE_FORMAT_YAML = 2;
}

enum ResourceOperation {
  RESOURCE_OPERATION_UNSPECIFIED = 0;
  RESOURCE_OPERATION_CREATE = 1;
  RESOURCE_OPERATION_UPDATE = 2;
}

enum IssueSeverity {
  ISSUE_SEVERITY_UNSPECIFIED = 0;
  ISSUE_SEVERITY_BLOCKING = 1;
  ISSUE_SEVERITY_WARNING = 2;
}

enum SemanticChangeOperation {
  SEMANTIC_CHANGE_OPERATION_UNSPECIFIED = 0;
  SEMANTIC_CHANGE_OPERATION_ADD = 1;
  SEMANTIC_CHANGE_OPERATION_REMOVE = 2;
  SEMANTIC_CHANGE_OPERATION_REPLACE = 3;
}

enum PlanStatus {
  PLAN_STATUS_UNSPECIFIED = 0;
  PLAN_STATUS_PENDING = 1;
  PLAN_STATUS_APPLIED = 2;
  PLAN_STATUS_CANCELLED = 3;
  PLAN_STATUS_EXPIRED = 4;
}

message ResourceSource {
  SourceFormat format = 1;
  bytes content = 2;
}

message TypeMeta {
  string api_version = 1;
  string kind = 2;
}

message ResourceTarget {
  TypeMeta type_meta = 1;
  string namespace = 2;
  string name = 3;
}

message ResourceIdentity {
  ResourceTarget target = 1;
  string uid = 2;
}

message Resource {
  int64 id = 1;
  ResourceIdentity identity = 2;
  string display_name = 3;
  map<string, string> labels = 4;
  bytes status_json = 5;
  int64 revision = 6;
  int64 generation = 7;
  int64 resource_version = 8;
  int64 created_by_id = 9;
  int64 updated_by_id = 10;
  string created_at = 11;
  string updated_at = 12;
}

message ResolvedReference {
  TypeMeta type_meta = 1;
  string namespace = 2;
  string name = 3;
  string uid = 4;
  int64 revision = 5;
  string digest = 6;
}

message PlanIssue {
  IssueSeverity severity = 1;
  string path = 2;
  string code = 3;
  string message = 4;
}

message ChangeValue {
  oneof value {
    string digest = 1;
    bytes redacted_json = 2;
  }
}

message SemanticChange {
  SemanticChangeOperation operation = 1;
  string path = 2;
  optional ChangeValue before = 3;
  optional ChangeValue after = 4;
}

message ResourcePlan {
  string plan_id = 1;
  ResourceOperation operation = 2;
  ResourceTarget target = 3;
  optional ResourceIdentity base = 4;
  int64 base_resource_version = 5;
  string draft_hash = 6;
  string plan_hash = 7;
  string artifact_digest = 8;
  repeated ResolvedReference resolved_references = 9;
  repeated SemanticChange semantic_diff = 10;
  repeated PlanIssue issues = 11;
  string artifact_kind = 12;
  string options_revision = 13;
  string created_at = 14;
  string expires_at = 15;
  PlanStatus status = 16;
}
