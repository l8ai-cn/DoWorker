syntax = "proto3";

package proto.orchestration_resource.v1;

import "orchestration_resource/v1/orchestration_resource_types.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/orchestration_resource/v1;orchestrationresourcev1";

enum EnvironmentBundlePurpose {
  ENVIRONMENT_BUNDLE_PURPOSE_UNSPECIFIED = 0;
  ENVIRONMENT_BUNDLE_PURPOSE_RUNTIME = 1;
  ENVIRONMENT_BUNDLE_PURPOSE_CONFIG = 2;
  ENVIRONMENT_BUNDLE_PURPOSE_CREDENTIAL = 3;
}

message ValidateResourceRequest {
  string org_slug = 1;
  ResourceSource source = 2;
}

message ValidateResourceResponse {
  ResourceTarget target = 1;
  ResourceOperation operation = 2;
  bytes canonical_json = 3;
  repeated PlanIssue issues = 4;
}

message PlanResourceRequest {
  string org_slug = 1;
  ResourceSource source = 2;
}

message PlanResourceResponse {
  ResourceTarget target = 1;
  ResourceOperation operation = 2;
  bytes canonical_json = 3;
  repeated PlanIssue issues = 4;
  optional ResourcePlan plan = 5;
}

message GetResourceRequest {
  string org_slug = 1;
  ResourceTarget target = 2;
}

message ResourceCapabilities {
  bool exists = 1;
  bool can_view_source = 2;
  bool can_reference = 3;
  bool can_plan = 4;
}

message GetResourceCapabilitiesRequest {
  string org_slug = 1;
  ResourceTarget target = 2;
}

message GetResourceCapabilitiesResponse {
  ResourceTarget target = 1;
  ResourceCapabilities capabilities = 2;
}

message EnvironmentBundleReferenceFilter {
  EnvironmentBundlePurpose purpose = 1;
  string worker_type = 2;
  string target_name = 3;
}

message ListResourcesRequest {
  string org_slug = 1;
  optional string kind = 2;
  optional int32 offset = 3;
  optional int32 limit = 4;
  optional EnvironmentBundleReferenceFilter environment_bundle_filter = 5;
}

message ListResourcesResponse {
  repeated Resource items = 1;
  int64 total = 2;
  int32 limit = 3;
  int32 offset = 4;
  optional EnvironmentBundleReferenceFilter applied_environment_bundle_filter = 5;
}

message ExportResourceRequest {
  string org_slug = 1;
  ResourceTarget target = 2;
  // Absent or zero exports the active revision.
  optional int64 revision = 3;
  SourceFormat format = 4;
}

message ExportResourceResponse {
  bytes content = 1;
}

message GetResourcePlanRequest {
  string org_slug = 1;
  string plan_id = 2;
}
