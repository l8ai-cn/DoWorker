syntax = "proto3";

package proto.orchestration_resource.v1;

import "orchestration_resource/v1/orchestration_resource_apply.proto";
import "orchestration_resource/v1/orchestration_resource_queries.proto";
import "orchestration_resource/v1/orchestration_resource_types.proto";

option go_package = "github.com/anthropics/agentsmesh/proto/gen/go/orchestration_resource/v1;orchestrationresourcev1";

service OrchestrationResourceService {
  rpc ValidateResource(ValidateResourceRequest) returns (ValidateResourceResponse);
  rpc PlanResource(PlanResourceRequest) returns (PlanResourceResponse);
  rpc GetResource(GetResourceRequest) returns (Resource);
  rpc GetResourceCapabilities(GetResourceCapabilitiesRequest) returns (GetResourceCapabilitiesResponse);
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
  rpc ExportResource(ExportResourceRequest) returns (ExportResourceResponse);
  rpc GetResourcePlan(GetResourcePlanRequest) returns (ResourcePlan);
  rpc ApplyBindingResourcePlan(ApplyBindingResourcePlanRequest) returns (Resource);
  rpc ApplyWorkerTemplatePlan(ApplyWorkerTemplatePlanRequest) returns (ApplyWorkerTemplatePlanResponse);
  rpc CreateWorkerFromPlan(CreateWorkerFromPlanRequest) returns (CreateWorkerFromPlanResponse);
  rpc CreateGoalLoopFromPlan(CreateGoalLoopFromPlanRequest) returns (CreateGoalLoopFromPlanResponse);
  rpc ApplyPromptPlan(ApplyPromptPlanRequest) returns (Resource);
  rpc ApplyExpertPlan(ApplyExpertPlanRequest) returns (ApplyExpertPlanResponse);
  rpc ApplyWorkflowPlan(ApplyWorkflowPlanRequest) returns (ApplyWorkflowPlanResponse);
}
