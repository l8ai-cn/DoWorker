# pnpm workspace — root deps + first-party @do-worker/* / do-worker-wasm.
#
# `packages` is required: pnpm errors with "packages field missing or empty"
# when the field is absent (CI `pnpm install` for Hive/Playwright).
#
# pnpm 11+ reads overrides / build-policy from this file (not package.json#pnpm).
packages:
  - "."
  - "packages/*"
  - "proto"
overrides:
  # Next.js 16 pulls in @playwright/test@1.59.1 as a peer dep, which
  # conflicts with the Bazel `rules_playwright` compatible version
  # (rules_playwright 0.5.3 targets Playwright 1.50 — 1.59 triggers
  # module-identity check failures under aspect_rules_js's sandbox).
  "@playwright/test": "1.50.1"
  playwright: "1.50.1"
  playwright-core: "1.50.1"
  eslint-plugin-react-hooks: "7.0.1"
ignoredBuiltDependencies:
  - sharp
  - unrs-resolver
onlyBuiltDependencies:
  - esbuild
  - "@parcel/watcher"
