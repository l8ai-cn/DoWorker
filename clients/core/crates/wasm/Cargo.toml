[package]
name = "agentcloud_wasm"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
name = "agentcloud_wasm"

[dependencies]
agentcloud_api_client = { workspace = true }
agentcloud_auth = { workspace = true }
agentcloud_events = { workspace = true }
agentcloud_logging = { workspace = true }
agentcloud_persistence = { workspace = true }
agentcloud_protocol = { workspace = true }
agentcloud_relay = { workspace = true }
agentcloud_services = { workspace = true }
agentcloud_state = { workspace = true }
agentcloud_transport = { workspace = true }
agentcloud_types = { workspace = true }
console_error_panic_hook = { workspace = true }
futures = { workspace = true }
js-sys = { workspace = true }
parking_lot = { workspace = true }
prost = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-sys = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reqwest = { workspace = true, features = ["rustls-tls"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }

[package.metadata.wasm-pack.profile.release]
wasm-opt = [
  "-O",
  "--enable-bulk-memory",
  "--enable-mutable-globals",
  "--enable-nontrapping-float-to-int",
]
