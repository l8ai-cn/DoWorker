[package]
name = "agentsmesh_wasm"
version.workspace = true
edition.workspace = true
publish.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]
name = "agentsmesh_wasm"

[dependencies]
agentsmesh_api_client = { workspace = true }
agentsmesh_auth = { workspace = true }
agentsmesh_events = { workspace = true }
agentsmesh_logging = { workspace = true }
agentsmesh_persistence = { workspace = true }
agentsmesh_protocol = { workspace = true }
agentsmesh_relay = { workspace = true }
agentsmesh_services = { workspace = true }
agentsmesh_state = { workspace = true }
agentsmesh_transport = { workspace = true }
agentsmesh_types = { workspace = true }
console_error_panic_hook = { workspace = true }
futures = { workspace = true }
js-sys = { workspace = true }
parking_lot = { workspace = true }
prost = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
web-sys = { workspace = true }

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
reqwest = { workspace = true, features = ["rustls-tls"] }

[target.'cfg(target_arch = "wasm32")'.dependencies]
reqwest = { workspace = true }

[dev-dependencies]
tokio = { workspace = true }
